# Build the Z1N MF Analyser Windows installer on release tags.
# Output: GitHub Release asset Z1NMFAnalyser-Setup-vX.Y.Z.exe.

name: build-installer

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # allow softprops/action-gh-release to create / update Releases

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install launcher dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.3.0 pystray==0.19.5 Pillow==10.2.0 requests==2.31.0

      - name: Build tray launcher .exe
        working-directory: installer/tray_launcher
        run: pyinstaller launcher.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        working-directory: installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          & $iscc setup.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Z1NMFAnalyser-Installer
          path: installer/Output/Z1NMFAnalyser-Setup-*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/Z1NMFAnalyser-Setup-*.exe
          generate_release_notes: true

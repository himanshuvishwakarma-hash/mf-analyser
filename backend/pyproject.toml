[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "B", "UP"]
# B008: FastAPI Depends() in defaults is standard, not a bug.
# UP017: datetime.UTC alias requires py311; keep timezone.utc for py310 dev parity.
ignore = ["E501", "B008", "UP017"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

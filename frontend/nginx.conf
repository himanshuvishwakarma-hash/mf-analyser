# nginx config for Z1N MF Analyser frontend
# Serves the Vite-built SPA on port 80 with HTML5 history fallback.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets
    gzip on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        application/wasm
        image/svg+xml;

    # Cache hashed Vite assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Light healthcheck path for compose healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
